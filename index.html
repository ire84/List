<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Cumpărături</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e0c; --surface: #1a1815; --card: #221f1b; --border: #2e2b26;
    --accent: #e8c84a; --accent2: #d4854a; --text: #f0ead8; --muted: #8a8070;
    --danger: #c0392b; --green: #4caf76; --recur: #7b68c8;
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 20px;
    background-image: radial-gradient(ellipse at 20% 0%, #2a2215 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, #1a1410 0%, transparent 60%);
  }
  .app { max-width: 680px; margin: 0 auto; }
  header { text-align: center; padding: 36px 0 28px; animation: fadeDown 0.6s ease both; }
  .logo-icon { font-size: 2.4rem; margin-bottom: 12px; display: block; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  header p { color: var(--muted); font-size: 0.88rem; margin-top: 6px; font-weight: 300; }

  .add-bar { display: flex; gap: 10px; margin-bottom: 24px; animation: fadeUp 0.6s 0.1s ease both; }
  .add-bar input {
    flex: 1; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 13px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  .add-bar input::placeholder { color: var(--muted); }
  .add-bar input:focus { border-color: var(--accent); }
  .cat-select {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 13px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    outline: none; cursor: pointer; min-width: 120px; transition: border-color 0.2s;
  }
  .cat-select:focus { border-color: var(--accent); }
  .cat-select option { background: #1a1815; }
  .btn-add {
    background: var(--accent); color: #0f0e0c; border: none; border-radius: 10px;
    padding: 13px 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1.1rem;
    cursor: pointer; transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  .btn-add:hover { background: #f0d45e; transform: scale(1.03); }

  /* RECURRING PANEL */
  .recur-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 24px; overflow: hidden; animation: fadeUp 0.6s 0.12s ease both;
  }
  .recur-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px; cursor: pointer; user-select: none; transition: background 0.2s;
  }
  .recur-header:hover { background: rgba(123,104,200,0.08); }
  .recur-header-left { display: flex; align-items: center; gap: 10px; }
  .recur-header-left > span { font-size: 1.1rem; }
  .recur-title { font-weight: 600; font-size: 0.92rem; color: var(--recur); }
  .recur-sub { font-size: 0.76rem; color: var(--muted); margin-top: 1px; }
  .recur-chevron { color: var(--muted); font-size: 0.8rem; transition: transform 0.3s; }
  .recur-chevron.open { transform: rotate(180deg); }
  .recur-body { padding: 0 14px 14px; display: none; }
  .recur-body.open { display: block; }
  .recur-add-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .recur-add-row input {
    flex: 1; background: var(--card); border: 1.5px solid var(--border); border-radius: 9px;
    padding: 10px 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    outline: none; transition: border-color 0.2s;
  }
  .recur-add-row input:focus { border-color: var(--recur); }
  .recur-add-row input::placeholder { color: var(--muted); }
  .recur-add-row select {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 9px;
    padding: 10px 9px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    outline: none; cursor: pointer; min-width: 110px;
  }
  .recur-add-row select option { background: #1a1815; }
  .btn-recur-add {
    background: var(--recur); color: white; border: none; border-radius: 9px;
    padding: 10px 16px; font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.1s;
    flex-shrink: 0; font-family: 'DM Sans', sans-serif;
  }
  .btn-recur-add:hover { background: #9080d8; transform: scale(1.04); }
  .recur-grid { display: flex; flex-wrap: wrap; gap: 7px; }
  .recur-chip {
    display: flex; align-items: center; gap: 7px; background: var(--card);
    border: 1px solid var(--border); border-radius: 20px; padding: 7px 12px;
    font-size: 0.84rem; transition: all 0.2s; animation: slideIn 0.25s ease both;
  }
  .recur-chip:hover { border-color: var(--recur); }
  .recur-chip-name { color: var(--text); font-weight: 500; }
  .recur-chip-cat { color: var(--muted); font-size: 0.75rem; margin-left: 2px; }
  .chip-add-btn {
    background: var(--recur); color: white; border: none; border-radius: 50%;
    width: 20px; height: 20px; font-size: 0.85rem; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: background 0.15s, transform 0.15s;
    flex-shrink: 0; line-height: 1;
  }
  .chip-add-btn:hover { background: #9080d8; transform: scale(1.15); }
  .chip-add-btn.added { background: var(--green); }
  .chip-del-btn {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.75rem; padding: 1px 3px; border-radius: 4px; transition: color 0.15s; line-height: 1;
  }
  .chip-del-btn:hover { color: var(--danger); }
  .recur-empty { color: var(--muted); font-size: 0.83rem; text-align: center; padding: 16px 0 6px; }
  .add-all-btn {
    margin-top: 12px; width: 100%; padding: 9px; background: transparent;
    border: 1.5px dashed var(--recur); border-radius: 9px; color: var(--recur);
    font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .add-all-btn:hover { background: rgba(123,104,200,0.1); }

  /* TABS */
  .tabs {
    display: flex; gap: 6px; margin-bottom: 20px; background: var(--surface);
    border-radius: 12px; padding: 5px; animation: fadeUp 0.6s 0.18s ease both;
  }
  .tab {
    flex: 1; text-align: center; padding: 9px 8px; border-radius: 9px; font-size: 0.82rem;
    font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--muted);
    border: none; background: transparent; font-family: 'DM Sans', sans-serif;
  }
  .tab.active { background: var(--card); color: var(--accent); border: 1px solid var(--border); }

  /* STATS */
  .stats-bar { display: flex; gap: 10px; margin-bottom: 24px; animation: fadeUp 0.6s 0.22s ease both; }
  .stat { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ITEMS */
  .category-group { margin-bottom: 18px; animation: fadeUp 0.4s ease both; }
  .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 0 4px; }
  .cat-header .cat-name { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }
  .cat-header .cat-line { flex: 1; height: 1px; background: var(--border); }
  .item {
    display: flex; align-items: center; gap: 12px; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 7px; transition: all 0.2s; animation: slideIn 0.3s ease both;
    position: relative; overflow: hidden;
  }
  .item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent2); opacity: 0; transition: opacity 0.2s;
  }
  .item.urgent::before { opacity: 1; background: var(--danger); }
  .item.bought::before { opacity: 1; background: var(--green); }
  .item:hover { border-color: #3a3630; transform: translateX(2px); }
  .item.bought { opacity: 0.55; }
  .item.bought .item-name { text-decoration: line-through; color: var(--muted); }
  .check-btn {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
    background: transparent; cursor: pointer; transition: all 0.2s; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0; color: transparent; font-size: 12px;
  }
  .check-btn:hover { border-color: var(--green); }
  .item.bought .check-btn { background: var(--green); border-color: var(--green); color: white; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 0.95rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 0.74rem; color: var(--muted); margin-top: 1px; }
  .recur-badge { color: var(--recur); font-size: 0.72rem; }
  .item-qty { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .qty-btn {
    width: 24px; height: 24px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-num { font-size: 0.88rem; font-weight: 600; min-width: 18px; text-align: center; color: var(--text); }
  .urgent-btn { background: transparent; border: none; cursor: pointer; font-size: 1rem; opacity: 0.4; transition: opacity 0.2s, transform 0.2s; padding: 2px; }
  .urgent-btn:hover { opacity: 1; transform: scale(1.2); }
  .item.urgent .urgent-btn { opacity: 1; }
  .del-btn { background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 0.9rem; padding: 4px; border-radius: 5px; transition: color 0.15s, background 0.15s; flex-shrink: 0; }
  .del-btn:hover { color: var(--danger); background: rgba(192,57,43,0.1); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); animation: fadeUp 0.5s ease both; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  .action-row { display: flex; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); animation: fadeUp 0.6s 0.28s ease both; }
  .btn-secondary {
    flex: 1; padding: 11px; border-radius: 10px; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem; cursor: pointer; transition: all 0.2s; font-weight: 500;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    flex: 1; padding: 11px; border-radius: 10px; border: none; background: var(--accent2);
    color: white; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; cursor: pointer; transition: all 0.2s; font-weight: 600;
  }
  .btn-primary:hover { background: #e09555; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 11px 20px; border-radius: 10px; font-size: 0.88rem; opacity: 0;
    transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }

  @media (max-width: 480px) {
    body { padding: 12px; }
    header h1 { font-size: 1.7rem; }
    .add-bar { flex-wrap: wrap; }
    .cat-select { min-width: unset; width: 100%; }
    .tabs { overflow-x: auto; }
    .recur-add-row { flex-wrap: wrap; }
    .recur-add-row select { min-width: unset; width: 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="logo-icon">🛒</span>
    <h1>Lista de Cumpărături</h1>
    <p>Notează ce se termină • Cumpără fără să uiți nimic</p>
  </header>

  <div class="add-bar">
    <input type="text" id="newItem" placeholder="Ce s-a terminat? (ex: lapte, pâine...)" maxlength="60" />
    <select class="cat-select" id="newCat">
      <option value="🥬 Legume & Fructe">🥬 Legume</option>
      <option value="🥛 Lactate">🥛 Lactate</option>
      <option value="🥩 Carne & Pește">🥩 Carne</option>
      <option value="🥖 Panificație">🥖 Pâine</option>
      <option value="🧴 Igienă">🧴 Igienă</option>
      <option value="🧹 Curățenie">🧹 Curățenie</option>
      <option value="🥫 Conserve & Borcane">🥫 Conserve</option>
      <option value="🧂 Condimente & Ulei">🧂 Condimente</option>
      <option value="🍫 Dulciuri & Snacks">🍫 Dulciuri</option>
      <option value="🧃 Băuturi">🧃 Băuturi</option>
      <option value="❄️ Congelate">❄️ Congelate</option>
      <option value="📦 Altele">📦 Altele</option>
    </select>
    <button class="btn-add" onclick="addItem()">＋</button>
  </div>

  <!-- RECURRING PANEL -->
  <div class="recur-panel">
    <div class="recur-header" onclick="toggleRecurPanel()">
      <div class="recur-header-left">
        <span>🔁</span>
        <div>
          <div class="recur-title">Produse Recurente</div>
          <div class="recur-sub">Produse pe care le cumperi mereu — adaugă cu un singur click</div>
        </div>
      </div>
      <span class="recur-chevron" id="recurChevron">▼</span>
    </div>
    <div class="recur-body" id="recurBody">
      <div class="recur-add-row">
        <input type="text" id="recurInput" placeholder="Nume produs recurent..." maxlength="50" />
        <select id="recurCat">
          <option value="🥬 Legume & Fructe">🥬 Legume</option>
          <option value="🥛 Lactate">🥛 Lactate</option>
          <option value="🥩 Carne & Pește">🥩 Carne</option>
          <option value="🥖 Panificație">🥖 Pâine</option>
          <option value="🧴 Igienă">🧴 Igienă</option>
          <option value="🧹 Curățenie">🧹 Curățenie</option>
          <option value="🥫 Conserve & Borcane">🥫 Conserve</option>
          <option value="🧂 Condimente & Ulei">🧂 Condimente</option>
          <option value="🍫 Dulciuri & Snacks">🍫 Dulciuri</option>
          <option value="🧃 Băuturi">🧃 Băuturi</option>
          <option value="❄️ Congelate">❄️ Congelate</option>
          <option value="📦 Altele">📦 Altele</option>
        </select>
        <button class="btn-recur-add" onclick="addRecurring()">＋</button>
      </div>
      <div class="recur-grid" id="recurGrid"></div>
      <button class="add-all-btn" id="addAllBtn" onclick="addAllRecurring()" style="display:none">
        ＋ Adaugă toate recurentele în lista curentă
      </button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('all', this)">📋 Toate (<span id="cnt-all">0</span>)</button>
    <button class="tab" onclick="setTab('pending', this)">⏳ De cumpărat (<span id="cnt-pending">0</span>)</button>
    <button class="tab" onclick="setTab('urgent', this)">🔴 Urgente (<span id="cnt-urgent">0</span>)</button>
    <button class="tab" onclick="setTab('bought', this)">✅ Bifate (<span id="cnt-bought">0</span>)</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Produse</div></div>
    <div class="stat"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">Rămase</div></div>
    <div class="stat"><div class="stat-num" id="stat-urgent">0</div><div class="stat-label">Urgente</div></div>
    <div class="stat"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Bifate</div></div>
  </div>

  <div id="list"></div>

  <div class="action-row">
    <button class="btn-secondary" onclick="clearBought()">🗑 Șterge bifate</button>
    <button class="btn-secondary" onclick="copyList()">📋 Copiază lista</button>
    <button class="btn-primary" onclick="clearAll()">🔄 Listă nouă</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let items = JSON.parse(localStorage.getItem('lista_v2') || '[]');
  let recurring = JSON.parse(localStorage.getItem('lista_recurring') || '[]');
  let currentTab = 'all';

  function toggleRecurPanel() {
    const body = document.getElementById('recurBody');
    const chev = document.getElementById('recurChevron');
    const isOpen = body.classList.toggle('open');
    chev.classList.toggle('open', isOpen);
  }

  function addRecurring() {
    const input = document.getElementById('recurInput');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const cat = document.getElementById('recurCat').value;
    if (recurring.find(r => r.name.toLowerCase() === name.toLowerCase())) {
      showToast('⚠️ Deja există în recurente'); return;
    }
    recurring.push({ id: Date.now(), name, cat });
    input.value = ''; input.focus();
    saveRecurring();
    showToast('🔁 ' + name + ' salvat ca recurent');
  }

  document.getElementById('recurInput').addEventListener('keydown', e => { if (e.key === 'Enter') addRecurring(); });

  function addRecurringToList(id) {
    const r = recurring.find(r => r.id === id);
    if (!r) return;
    const alreadyIn = items.find(i => i.name.toLowerCase() === r.name.toLowerCase() && !i.bought);
    if (alreadyIn) { showToast('ℹ️ ' + r.name + ' e deja în listă'); return; }
    items.unshift({ id: Date.now(), name: r.name, cat: r.cat, qty: 1, urgent: false, bought: false, added: new Date().toLocaleDateString('ro-RO'), fromRecurring: true });
    saveItems();
    const btn = document.querySelector(`.chip-add-btn[data-rid="${id}"]`);
    if (btn) { btn.classList.add('added'); btn.textContent = '✓'; setTimeout(() => { btn.classList.remove('added'); btn.textContent = '+'; }, 1400); }
    showToast('✓ ' + r.name + ' adăugat în listă');
  }

  function addAllRecurring() {
    let added = 0;
    recurring.forEach(r => {
      const alreadyIn = items.find(i => i.name.toLowerCase() === r.name.toLowerCase() && !i.bought);
      if (!alreadyIn) {
        items.unshift({ id: Date.now() + Math.random(), name: r.name, cat: r.cat, qty: 1, urgent: false, bought: false, added: new Date().toLocaleDateString('ro-RO'), fromRecurring: true });
        added++;
      }
    });
    if (!added) { showToast('ℹ️ Toate recurentele sunt deja în listă'); return; }
    saveItems();
    showToast('✓ ' + added + ' produse adăugate în listă');
    renderRecurGrid();
  }

  function deleteRecurring(id) {
    recurring = recurring.filter(r => r.id !== id);
    saveRecurring();
    showToast('🗑 Șters din recurente');
  }

  function saveRecurring() {
    localStorage.setItem('lista_recurring', JSON.stringify(recurring));
    renderRecurGrid();
  }

  function renderRecurGrid() {
    const grid = document.getElementById('recurGrid');
    const addAllBtn = document.getElementById('addAllBtn');
    if (!recurring.length) {
      grid.innerHTML = '<div class="recur-empty">Niciun produs recurent salvat încă.<br>Adaugă produsele pe care le cumperi mereu!</div>';
      addAllBtn.style.display = 'none';
      return;
    }
    addAllBtn.style.display = 'block';
    grid.innerHTML = recurring.map(r => `
      <div class="recur-chip">
        <button class="chip-add-btn" data-rid="${r.id}" onclick="addRecurringToList(${r.id})" title="Adaugă în lista curentă">+</button>
        <span class="recur-chip-name">${escHtml(r.name)}</span>
        <span class="recur-chip-cat">${r.cat.split(' ')[0]}</span>
        <button class="chip-del-btn" onclick="deleteRecurring(${r.id})" title="Șterge din recurente">✕</button>
      </div>
    `).join('');
  }

  function saveItems() {
    localStorage.setItem('lista_v2', JSON.stringify(items));
    render();
  }

  function addItem() {
    const input = document.getElementById('newItem');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const cat = document.getElementById('newCat').value;
    items.unshift({ id: Date.now(), name, cat, qty: 1, urgent: false, bought: false, added: new Date().toLocaleDateString('ro-RO') });
    input.value = ''; input.focus();
    saveItems();
    showToast('✓ ' + name + ' adăugat');
  }

  document.getElementById('newItem').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  function toggleBought(id) {
    const it = items.find(i => i.id === id);
    if (it) { it.bought = !it.bought; if (it.bought) it.urgent = false; saveItems(); }
  }
  function toggleUrgent(id) {
    const it = items.find(i => i.id === id);
    if (it) { it.urgent = !it.urgent; saveItems(); }
  }
  function changeQty(id, delta) {
    const it = items.find(i => i.id === id);
    if (it) { it.qty = Math.max(1, (it.qty || 1) + delta); saveItems(); }
  }
  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    saveItems();
  }
  function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  }
  function clearBought() {
    const count = items.filter(i => i.bought).length;
    if (!count) { showToast('Nu ai produse bifate'); return; }
    items = items.filter(i => !i.bought);
    saveItems();
    showToast('🗑 ' + count + ' produse șterse');
  }
  function clearAll() {
    if (!items.length) { showToast('Lista e deja goală'); return; }
    if (!confirm('Ștergi toată lista curentă?\n(Recurentele rămân salvate)')) return;
    items = [];
    saveItems();
    showToast('🔄 Listă nouă, gata de completat!');
  }
  function copyList() {
    const pending = items.filter(i => !i.bought);
    if (!pending.length) { showToast('Nu ai nimic de cumpărat'); return; }
    const grouped = {};
    pending.forEach(i => { if (!grouped[i.cat]) grouped[i.cat] = []; grouped[i.cat].push(i); });
    let text = '🛒 Lista de cumpărături\n\n';
    Object.entries(grouped).forEach(([cat, arr]) => {
      text += cat + '\n';
      arr.forEach(i => { text += `  ${i.urgent ? '🔴 ' : ''}${i.name}${i.qty > 1 ? ' x' + i.qty : ''}\n`; });
      text += '\n';
    });
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copiat în clipboard!')).catch(() => showToast('❌ Nu s-a putut copia'));
  }

  function render() {
    let filtered = items;
    if (currentTab === 'pending') filtered = items.filter(i => !i.bought);
    else if (currentTab === 'urgent') filtered = items.filter(i => i.urgent && !i.bought);
    else if (currentTab === 'bought') filtered = items.filter(i => i.bought);

    const cnt = {
      all: items.length, pending: items.filter(i => !i.bought).length,
      urgent: items.filter(i => i.urgent && !i.bought).length, bought: items.filter(i => i.bought).length
    };
    document.getElementById('cnt-all').textContent = cnt.all;
    document.getElementById('cnt-pending').textContent = cnt.pending;
    document.getElementById('cnt-urgent').textContent = cnt.urgent;
    document.getElementById('cnt-bought').textContent = cnt.bought;
    document.getElementById('stat-total').textContent = cnt.all;
    document.getElementById('stat-pending').textContent = cnt.pending;
    document.getElementById('stat-urgent').textContent = cnt.urgent;
    document.getElementById('stat-done').textContent = cnt.bought;

    const listEl = document.getElementById('list');
    if (!filtered.length) {
      const msgs = {
        all: ['🎉', 'Lista e goală!', 'Adaugă produse sau apasă pe recurente de mai sus.'],
        pending: ['✅', 'Totul e cumpărat!', 'Poți reseta sau adăuga produse noi.'],
        urgent: ['😌', 'Nimic urgent!', 'Marchează cu 🔴 produsele de care ai nevoie urgent.'],
        bought: ['🛒', 'Nimic bifat încă', 'Bifează produsele după ce le cumperi.']
      };
      const [icon, title, sub] = msgs[currentTab];
      listEl.innerHTML = `<div class="empty-state"><div class="icon">${icon}</div><p><strong>${title}</strong><br>${sub}</p></div>`;
      return;
    }
    const grouped = {};
    filtered.forEach(i => { if (!grouped[i.cat]) grouped[i.cat] = []; grouped[i.cat].push(i); });
    listEl.innerHTML = Object.entries(grouped).map(([cat, arr]) => `
      <div class="category-group">
        <div class="cat-header"><span class="cat-name">${cat}</span><div class="cat-line"></div></div>
        ${arr.map(i => `
          <div class="item ${i.urgent ? 'urgent' : ''} ${i.bought ? 'bought' : ''}">
            <button class="check-btn" onclick="toggleBought(${i.id})" title="Bifează cumpărat">✓</button>
            <div class="item-info">
              <div class="item-name">${escHtml(i.name)}</div>
              <div class="item-meta">${i.fromRecurring ? '<span class="recur-badge">🔁 Recurent · </span>' : ''}Adăugat: ${i.added || 'azi'}</div>
            </div>
            <div class="item-qty">
              <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
              <span class="qty-num">${i.qty || 1}</span>
              <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
            </div>
            <button class="urgent-btn" onclick="toggleUrgent(${i.id})" title="Marchează urgent">🔴</button>
            <button class="del-btn" onclick="deleteItem(${i.id})" title="Șterge">✕</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  // init — open panel if already have recurring items
  if (recurring.length) {
    document.getElementById('recurBody').classList.add('open');
    document.getElementById('recurChevron').classList.add('open');
  }
  renderRecurGrid();
  render();
</script>
</body>
</html>
